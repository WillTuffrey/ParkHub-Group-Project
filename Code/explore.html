<!DOCTYPE html>
<html lang="en">
    <link rel="stylesheet" href="mainPageStyling.css">
    <link rel="stylesheet" href="menuStyling.css">
    <script src="scripts.js"></script>
    <!-- Leaflet stylesheet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ParkHub - Explore</title>
        <header class="sticky">
            <section class="headerSection">
                <div>
                    <button type="button", onclick='toggleDropdown()' class="dropdownButton"><img class="dropdownMenuImage", src="images/3linesHorrizontal.png", alt="Dropdown Button"></button>
                </div>
                
                <article class="headerArticle">
                    <h1>Parkhub — Explore</h1>
                </article>                                             
            </section>    
        </header>
    </head>
    <body>
        <section>
            <nav class="sandwichNav"></nav>
            <article>
                <h2 class="centredText">Explore the different locations across Bristol in respective to your location</h2>
                <div id="exploreMap" class="div1">                    
                    <script>
                        var userLayer = L.layerGroup();
                        var carParkLayer = L.layerGroup();
                        var userLocationMarker = L.icon({
                            iconUrl: 'images/marker_orange.png',
                            shadowUrl: 'images/marker_shadow.png',
                            iconSize: [26,46],
                            iconAnchor: [13,46],
                            popupAnchor: [0,-48],                            
                            shadowSize: [40, 60],
                            shadowAnchor: [19.5, 56]
                        });
                        var carParkLocationMarker = L.icon({
                            iconUrl: 'images/marker_blue.png',
                            shadowUrl: 'images/marker_shadow.png',
                            iconSize: [26,46],
                            iconAnchor: [13,46],
                            popupAnchor: [0,-48],                            
                            shadowSize: [40, 60],
                            shadowAnchor: [19.5, 56]
                        });
                        function getLocation(page) {
                            if (navigator.geolocation) {
                                navigator.geolocation.getCurrentPosition( // if location is allowed, get the lat and lon of the user
                                    loc => window.location.href=`${page}?lat=${loc.coords.latitude}&lon=${loc.coords.longitude}`,
                                    () => window.location.href=`${page}?lat=51.4647924&lon=-2.598659`);
                                let marker = L.marker([lat, lon], {icon: userLocationMarker, zIndexOffset: 1000});
                                marker.bindPopup("<b>Your location</b>");
                                marker.addTo(userLayer);
                                page.addLayer(userLayer);
                                return true;
                            }
                            else { // positions centre if location is disallowed or not supported
                                window.alert("Geolocation is not supported by this browser.");
                                window.location.href=`${page}?lat=51.4647924&lon=-2.598659`;
                                page.removeLayer(userLayer);
                                return false;
                            }
                        }                        
                        function outputMarkers(json) {
                            let f = json.features;
                            for(let i=0;i<f.length;i++) {
                                let a = f[i].attributes;
                                let lon = f[i].geometry.x;
                                let lat = f[i].geometry.y;
                                let marker = L.marker([lat,lon], {icon: carParkLocationMarker}).addTo(map);
                                marker.bindPopup(`<b>${a.NAME}</b><br>
                                                    <b>${a.SPACES}</b> available spaces,<br>
                                                    <b>${a.TYPE_DESCRIPTION}</b><br>
                                                    <button class='markerButton' onclick="GetMoreInformation()">More information</button><br>
                                                    <button class="markerButton" onclick='OpenInPlan()'>Open in plan?</button>`);
                                marker.addTo(carParkLayer);
                            }
                        }
                        function mapQuery() {
                            let url = "https://maps2.bristol.gov.uk/server2/rest/services/ext/ll_transport/MapServer/5/query?where=1%3D1&outFields=NAME,AREA_NAME,OPERATOR,OPERATOR_NAME,SPACES,OPERATING_TIMES,TYPE_DESCRIPTION,CCTV,EASTINGS,NORTHINGS&outSR=4326&f=json"
                            fetch(url).then(r=>r.json()).then(outputMarkers);
                        }
                        var urlParams = new URLSearchParams(location.search);
                        var lat = urlParams.get('lat') || 51.464792;
                        var lon = urlParams.get('lon') || -2.598659;
                        var map = L.map('exploreMap').setView([lat,lon], 17);

                        //if (userLocationAllowed) { // remake to only show a marker when the location is being shared, otherwise it just shows the default location with no marker
                        //    L.marker([lat, lon], {icon: navigationPointer}).addTo(map).bindPopup("<b>Your location</b>").openPopup();
                        //}
                        function HasUserLocation(userLocationAllowed) {
                            if (userLocationAllowed) {                                
                                L.marker([lat, lon], {icon: userLocationMarker, zIndexOffset: 1000}).addTo(map).bindPopup("<b>Your location</b>").openPopup();
                            }
                            else{
                                L.marker([lat, lon], {icon: userLocationMarker, zIndexOffset: 1000}).removeFrom(map);
                            }                            
                        }
                        //HasUserLocation(getLocation('explore.html'));

                        L.marker([lat, lon], {icon: userLocationMarker, zIndexOffset: 1000}).addTo(map).bindPopup("<b>Your location</b>").openPopup();
                        
                        // attribution legally required by the OpenStreetMap license
                        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                        }).addTo(map);
                        mapQuery();                        
                    </script>
                </div>
                <button type="button" class="locationButton" onclick="getLocation('explore.html')">If your location is not shown by default, click here!</button>
            </article>            
            <nav class="sandwichNav"></nav>
        </section>        
    </body>
    <footer class="footer">
        <section class="footerSection">
            <article>
                <p class="centredText noPaddingMargin">Page designed and produced by <a href="https://github.com/WillTuffrey" class="link2" title="Will Tuffrey's GitHub">Will Tuffrey</a> and

                <p class="centredText noPaddingMargin">Send <a href="feedback.html" class="link2">Feedback</a></p>
            </article>
        </section>
    </footer>
</html>
