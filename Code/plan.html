    <head>                
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ParkHub - Plan</title>
        <header class="sticky">
            <section class="headerSection">
                <div>
                    <button type="button", onclick='toggleDropdown()' class="dropdownButton"><img class="dropdownMenuImage", src="images/3linesHorrizontal.png", alt="Dropdown Button"></button>
                </div>
                
                <article class="headerArticle">
                    <h1>Parkhub — Plan</h1>
                </article>                                             
            </section>    
        </header>
    </head>
    <body>
        <section>
            <nav>
                <p>Side bit - Contains buttons if required and dropdown/dropside menu</p>
                <p>Filter/field</p>
                <div>
                    <button type="radioButton", class="radioButton" onclick=""></button>
                </div>
                <p>Filter/field</p>
                <div>                    
                    <button type="radioButton", class="radioButton"></button>
                </div>
            </nav>
            <article>
                <h2>Page title/introdutory</h2>
                <div id="map">
                    <script>
                        function outputMarkers(json) {
                            let f = json.features;
                            for(let i=0;i<f.length;i++) {
                                let a = f[i].attributes;
                                let lon = f[i].geometry.x;
                                let lat = f[i].geometry.y;
                                let marker = L.marker([lat,lon]).addTo(map);
                                marker.bindPopup(`<b>${a.NAME}</b><br><b>${a.SPACES}</b> available spaces,<br><b>${a.TYPE_DESCRIPTION}</b>`);
                            }
                        }
                        function mapQuery() {
                            let url = "https://maps2.bristol.gov.uk/server2/rest/services/ext/ll_transport/MapServer/5/query?where=1%3D1&outFields=NAME,AREA_NAME,OPERATOR,OPERATOR_NAME,SPACES,OPERATING_TIMES,TYPE_DESCRIPTION,CCTV,EASTINGS,NORTHINGS&outSR=4326&f=json"
                            fetch(url).then(r=>r.json()).then(outputMarkers);
                        }
                        var urlParams = new URLSearchParams(location.search);
                        var lat = urlParams.get('lat') || 51.4545; // null lat is falsy, number is truthy
                        var lon = urlParams.get('lon') || -2.5879; // null lon is falsy, number is truthy
                        var map = L.map('map').setView([lat,lon], 12);
            
                        // attribution legally required by the OpenStreetMap license
                        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                        }).addTo(map);
                        mapQuery();
                    </script>
                </div>
            </article>
        </section>        
    </body>
